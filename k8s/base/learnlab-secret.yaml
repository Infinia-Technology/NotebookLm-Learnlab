apiVersion: v1
kind: Secret
metadata:
  name: learnlab-secret
  namespace: learnlab
type: Opaque
stringData:
  # ── MongoDB ──────────────────────────────────────────────
  MONGO_INITDB_ROOT_USERNAME: "app_admin"
  MONGO_INITDB_ROOT_PASSWORD: "CHANGE_ME_STRONG_PASSWORD_32CHARS"
  MONGO_INITDB_DATABASE: "app_database"
  MONGO_URI: "mongodb://app_admin:CHANGE_ME_STRONG_PASSWORD_32CHARS@mongo:27017/app_database?authSource=admin"

  # ── Redis ─────────────────────────────────────────────────
  REDIS_URL: "redis://redis:6379"

  # ── Backend App ───────────────────────────────────────────
  SECRET_KEY: "CHANGE_ME_REPLACE_WITH_YOUR_SECRET_KEY"

  # ── AI / LLM API Keys (keep only what your app uses) ─────
  OPENAI_API_KEY: "CHANGE_ME"
  ANTHROPIC_API_KEY: "CHANGE_ME"
  GEMINI_API_KEY: "CHANGE_ME"
