apiVersion: v1
kind: ConfigMap
metadata:
  name: learnlab-config
  namespace: learnlab
data:
  # ── Backend ───────────────────────────────────────────────
  PORT: "8000"
  ENVIRONMENT: "production"
  LOG_LEVEL: "info"

  # ── MongoDB ───────────────────────────────────────────────
  MONGO_HOST: "mongo"
  MONGO_PORT: "27017"

  # ── Redis ─────────────────────────────────────────────────
  REDIS_HOST: "redis"
  REDIS_PORT: "6379"
