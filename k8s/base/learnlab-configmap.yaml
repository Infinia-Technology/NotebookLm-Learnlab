apiVersion: v1
kind: ConfigMap
metadata:
  name: learnlab-config
  namespace: learnlab
data:
  # ── App ───────────────────────────────────────────────────
  APP_NAME: "EleVatria"
  PORT: "8000"
  ENVIRONMENT: "development"
  LOG_LEVEL: "info"
  DEBUG: "false"
  APP_BASE_URL: "https://learnlab.iamsaif.ai"

  # ── MongoDB ───────────────────────────────────────────────
  MONGO_DB: "app_database"
  MONGO_HOST: "mongo"
  MONGO_PORT: "27017"

  # ── Redis ─────────────────────────────────────────────────
  REDIS_HOST: "redis"
  REDIS_PORT: "6379"

  # ── CORS ──────────────────────────────────────────────────
  CORS_ORIGINS: '["https://learnlab.iamsaif.ai","http://localhost:3100","http://localhost:5173"]'

  # ── JWT ───────────────────────────────────────────────────
  JWT_ALGORITHM: "HS256"
  JWT_EXPIRE_DAYS: "7"

  # ── Email ─────────────────────────────────────────────────
  EMAIL_PROVIDER: "smtp"
  EMAIL_FROM: "ele646407@gmail.com"
  EMAIL_FROM_NAME: "EleVatria"
  ALLOW_ALL_EMAIL_DOMAINS: "true"
  SMTP_HOST: "smtp.gmail.com"
  SMTP_PORT: "587"
  SMTP_USER: "ele646407@gmail.com"
  SMTP_USE_TLS: "true"
  SMTP_USE_SSL: "false"

  # ── OTP ───────────────────────────────────────────────────
  OTP_RESEND_COOLDOWN_SECONDS: "30"

  # ── AI Services ───────────────────────────────────────────
  PODCAST_API_BASE: "https://asr.iamsaif.ai"
  WHISPER_API_BASE: "https://asr.iamsaif.ai"
