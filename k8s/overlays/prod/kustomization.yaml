apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: learnlab

resources:
  - ../../base

# Image tags are updated here automatically by GitHub Actions CI
# DO NOT edit these manually — the CI pipeline updates newTag on every merge to main
images:
  - name: ghcr.io/infinia-technology/learnlab-backend
    newTag: latest
  - name: ghcr.io/infinia-technology/learnlab-frontend
    newTag: 2ae82c2

patches:
  # Prod: 3 replicas for backend
  - patch: |-
      - op: replace
        path: /spec/replicas
        value: 3
    target:
      kind: Deployment
      name: backend

  # Prod: 3 replicas for frontend
  - patch: |-
      - op: replace
        path: /spec/replicas
        value: 3
    target:
      kind: Deployment
      name: frontend

  # Prod: larger MongoDB storage
  - patch: |-
      - op: replace
        path: /spec/volumeClaimTemplates/0/spec/resources/requests/storage
        value: 20Gi
    target:
      kind: StatefulSet
      name: mongo

  # Prod: larger backend resource limits
  - patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/cpu
        value: "1000m"
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: "1Gi"
    target:
      kind: Deployment
      name: backend
