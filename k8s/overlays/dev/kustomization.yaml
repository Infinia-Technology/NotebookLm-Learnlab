apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: learnlab

resources:
  - ../../base

# Image tags are updated here automatically by GitHub Actions CI
# DO NOT edit these manually — the CI pipeline updates newTag on every merge to main
images:
nfinia-technology/learnlab-backend/{n;s|newTag:.*|newTag: ed9ce12|}
nfinia-technology/learnlab-frontend/{n;s|newTag:.*|newTag: ed9ce12|}
  - name: ghcr.io/infinia-technology/learnlab-backend
    newTag: latest
nfinia-technology/learnlab-backend/{n;s|newTag:.*|newTag: ed9ce12|}
nfinia-technology/learnlab-frontend/{n;s|newTag:.*|newTag: ed9ce12|}
  - name: ghcr.io/infinia-technology/learnlab-frontend
    newTag: latest

patches:
  # Dev: 1 replica for backend
  - patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
    target:
      kind: Deployment
      name: backend

  # Dev: 1 replica for frontend
  - patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
    target:
      kind: Deployment
      name: frontend

  # Dev: smaller MongoDB storage
  - patch: |-
      - op: replace
        path: /spec/volumeClaimTemplates/0/spec/resources/requests/storage
        value: 5Gi
    target:
      kind: StatefulSet
      name: mongo
